resources:
  jobs:
    bronze_job:
      name: bronze_job

      tasks:
        - task_key: bronze_task
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/ingest.py
          environment_key: default  

      environments:
        - environment_key: default
          spec:
            dependencies:
              - "-r ../requirements.txt"
            client: "1"